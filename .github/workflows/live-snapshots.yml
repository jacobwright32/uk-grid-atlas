name: Refresh live snapshots

on:
  schedule:
    - cron: '17 */6 * * *' # every 6 hours
  workflow_dispatch:

permissions:
  contents: write
  actions: write # to dispatch the Pages deploy after a snapshot commit

concurrency:
  group: live-snapshots
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Fetch ENTSO-E snapshots
        env:
          ENTSOE_TOKEN: ${{ secrets.ENTSOE_TOKEN }}
        run: node scripts/fetch-entsoe-snapshot.mjs all
      - name: Fetch Canada snapshot (IESO, key-less)
        run: node scripts/fetch-ca-snapshot.mjs || echo "IESO fetch failed — keeping previous ca.json"
      - name: Fetch US snapshot (ERCOT + NYISO, key-less)
        run: node scripts/fetch-us-snapshot.mjs || echo "US fetch failed — keeping previous us.json"
      - name: Commit refreshed snapshots
        id: commit
        run: |
          git config user.name "grid-atlas-bot"
          git config user.email "actions@users.noreply.github.com"
          git add public/live data/entsoe-maps || true
          if git diff --cached --quiet; then
            echo "No snapshot changes."
            echo "pushed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore: refresh European live snapshots"
            git push
            echo "pushed=true" >> "$GITHUB_OUTPUT"
          fi
      # Pushes made with GITHUB_TOKEN don't fire `on: push` workflows, so the
      # site would never pick up refreshed snapshots — dispatch the deploy.
      - name: Trigger site deploy
        if: steps.commit.outputs.pushed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run deploy.yml --ref main
